name: Vercel Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main # Despliega a producción
      - dev # Despliega a preview

jobs:
  Deploy-Production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Build en la nube de Vercel (sin --prebuilt): toma SIEMPRE las env vars
      # actuales del proyecto y el deployment NO queda marcado como "prebuilt",
      # asi el boton Redeploy de la web sigue funcionando.
      - name: Deploy to Vercel (cloud build)
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}

  Deploy-Preview:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      # Build en la nube de Vercel (sin --prebuilt), mismo motivo que en produccion.
      - name: Deploy to Vercel (cloud build)
        run: vercel deploy --token=${{ secrets.VERCEL_TOKEN }}
