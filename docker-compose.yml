services:

  postgres:
    image: postgres:16

    container_name: puntualo_postgres

    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: puntualo_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    container_name: puntualo_redis

    restart: always

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./apps/backend

    container_name: puntualo_worker

    restart: always

    command: celery -A app.core.celery_app worker -l info

    env_file:
      - ./apps/backend/.env

    depends_on:
      - postgres
      - redis

volumes:
  postgres_data: